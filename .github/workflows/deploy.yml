name: Deploy til GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer afhængigheder
        run: npm ci

      - name: Byg applikation
        run: npm run build

      - name: SPA Routing Fix (Vigtigt for GitHub Pages)
        run: cp dist/index.html dist/404.html

      - name: Tilføj CNAME til dist (Custom Domain)
        run: echo "newwaysmedia.dk" > dist/CNAME

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
